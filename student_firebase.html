<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가나디증권</title>
<link rel="manifest" href="./manifest-student.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가나디증권">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="theme-color" content="#0d1117">
<style>
@font-face {
  font-family: 'SeoulNamsan';
  src: url('./SeoulNamsanM.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f3;--bg2:#ffffff;--bg3:#f0ede6;--bg4:#e8e4dc;
  --border:#2d2d2d;--border2:#1a1a1a;
  --text:#1a1a1a;--text2:#555555;--text3:#888888;
  --green:#3fb950;--green-bg:rgba(63,185,80,0.12);
  --red:#e03030;--red-bg:rgba(224,48,48,0.12);
  --blue:#2266cc;--blue-bg:rgba(34,102,204,0.12);
  --purple:#7744cc;--purple-bg:rgba(119,68,204,0.12);
  --radius:8px;--radius-lg:12px;
  --sketch-font:'SeoulNamsan',cursive,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:'SeoulNamsan',sans-serif;min-height:100vh;} * { -webkit-font-smoothing: antialiased; }
.app{max-width:760px;margin:0 auto;padding:0 0 80px;}
.header{padding:20px 16px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.header-left h1{font-size:17px;font-weight:700;}
.header-left p{font-size:12px;color:var(--text2);margin-top:2px;}
.market-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.status-dot.open{background:var(--green);box-shadow:0 0 6px var(--green);}
.login-screen{padding:40px 0;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;max-width:380px;margin:0 auto;}
.login-card h2{font-size:18px;font-weight:700;margin-bottom:8px;}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:24px;}
.login-card select{width:100%;padding:10px 14px;font-size:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'SeoulNamsan',sans-serif;margin-bottom:12px;outline:none;}
.login-card select:focus{border-color:var(--blue);}
.btn-primary{width:100%;padding:11px;font-size:14px;font-weight:700;background:var(--blue);border:none;border-radius:var(--radius);color:#0d1117;cursor:pointer;font-family:'SeoulNamsan',sans-serif;transition:opacity 0.15s;}
.btn-primary:hover{opacity:0.85;}
.tabs{display:flex;gap:2px;padding:12px 0;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;background:var(--bg);z-index:48;border-bottom:1px solid var(--border);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 14px;font-size:13px;font-weight:500;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:'SeoulNamsan',sans-serif;white-space:nowrap;transition:all 0.15s;}
.tab.active{background:var(--bg3);color:var(--text);}
.tab:hover:not(.active){color:var(--text);}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.metric-value{font-size:19px;font-weight:700;}
.metric-value.up{color:var(--red);}
.metric-value.down{color:var(--blue);}
.metric-value.neutral{color:var(--text);}
.metric-value.blue{color:var(--blue);}
.metric-sub{font-size:11px;margin-top:2px;}
.metric-sub.up{color:var(--red);}
.metric-sub.down{color:var(--blue);}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;margin-top:20px;}

/* ── 차트 모달 (모바일) ── */
.chart-modal{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow:hidden;}
.chart-modal-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.chart-modal-back{background:none;border:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px 0;margin-bottom:6px;display:block;min-height:44px;}
.chart-modal-name{font-size:18px;font-weight:700;}
.chart-modal-price{font-size:28px;font-weight:700;margin:2px 0;}
.chart-modal-change{font-size:14px;}
.chart-body{flex:1;overflow-y:auto;padding:12px 16px 100px;}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
canvas.chart-canvas{display:block;width:100%;}

/* ── PC 차트 패널 (오른쪽) ── */
.chart-side{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;}
.chart-side-header{margin-bottom:10px;}
.chart-side-name{font-size:14px;font-weight:700;}
.chart-side-price{font-size:20px;font-weight:700;margin-top:2px;}
.chart-side-change{font-size:12px;}

/* ── 차트 기간 탭 ── */
.chart-period-tabs{display:flex;gap:4px;margin-bottom:10px;}
.chart-period-tab{padding:4px 10px;font-size:11px;font-weight:600;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;}
.chart-period-tab.active{background:var(--bg3);color:var(--text);}
.marquee-wrap{overflow:hidden;background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 0;white-space:nowrap;position:sticky;top:0;z-index:49;}
.marquee-inner{display:inline-block;animation:marquee-scroll 30s linear infinite;}
.marquee-inner:hover{animation-play-state:paused;}
@keyframes marquee-scroll{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
.marquee-item{display:inline-block;color:#ff00cc;font-size:13px;font-weight:500;margin-right:80px;}
.section-title:first-child{margin-top:0;}
/* ── 스플래시 스크린 ── */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #faf8f3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}
#splash.hide {
  animation: splashFade 0.6s ease forwards;
}
@keyframes splashFade {
  to { opacity: 0; pointer-events: none; }
}

/* 배경 캔들들 */
.splash-candles {
  position: absolute; inset: 0;
  display: flex; align-items: flex-end;
  justify-content: center; gap: 6px;
  padding: 0 20px 0;
  opacity: 0;
  animation: candlesFadeIn 0.5s ease 0.2s forwards;
}
@keyframes candlesFadeIn { to { opacity: 0.25; } }

.splash-candle {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.candle-wick {
  width: 2px;
  border-radius: 1px;
  animation: wickGrow 0.4s ease forwards;
  transform-origin: bottom;
  transform: scaleY(0);
}
.candle-body {
  width: 18px;
  border-radius: 2px;
  animation: bodyGrow 0.4s ease forwards;
  transform-origin: bottom;
  transform: scaleY(0);
}
@keyframes wickGrow { to { transform: scaleY(1); } }
@keyframes bodyGrow { to { transform: scaleY(1); } }

/* 로고 영역 */
.splash-logo-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
}
.splash-icon {
  width: 88px; height: 88px;
  border-radius: 22px;
  object-fit: cover;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  opacity: 0;
  transform: scale(0.7);
  animation: iconPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
}
@keyframes iconPop {
  to { opacity: 1; transform: scale(1); }
}
.splash-title {
  font-family: 'SeoulNamsan', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #1a1a1a;
  margin-top: 18px;
  opacity: 0;
  transform: translateY(12px);
  animation: titleRise 0.5s ease 0.7s forwards;
}
@keyframes titleRise {
  to { opacity: 1; transform: translateY(0); }
}

/* 숫자 티커 */
.splash-tickers {
  display: flex; gap: 16px;
  margin-top: 20px;
  opacity: 0;
  animation: tickerFade 0.4s ease 1.1s forwards;
}
@keyframes tickerFade { to { opacity: 1; } }
.splash-tick {
  font-family: 'SeoulNamsan', sans-serif;
  font-size: 12px; font-weight: 600;
}
.splash-tick.up { color: #f85149; }
.splash-tick.dn { color: #58a6ff; }

/* 숫자 카운트업 */
.splash-tick span {
  display: inline-block;
  animation: numFlicker 0.08s steps(1) infinite;
}
@keyframes numFlicker {
  0%,100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* 로딩 바 */
.splash-bar-wrap {
  width: 140px; height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-top: 28px;
  opacity: 0;
  animation: barFadeIn 0.3s ease 1.3s forwards;
  overflow: hidden;
}
@keyframes barFadeIn { to { opacity: 1; } }
.splash-bar {
  height: 100%;
  background: linear-gradient(90deg, #e03030, #2266cc);
  border-radius: 2px;
  width: 0%;
  animation: barLoad 2.5s ease 1.3s forwards;
}
@keyframes barLoad { to { width: 100%; } }

.splash-sub {
  font-family: 'SeoulNamsan', sans-serif;
  font-size: 11px; color: #888888;
  margin-top: 10px;
  opacity: 0;
  animation: titleRise 0.4s ease 1.4s forwards;
  letter-spacing: 0.5px;
}
/* ── PC 스플래시 추가 스타일 ── */
@media (min-width: 900px) {
  #splash { flex-direction: row; }

  /* PC: 왼쪽 패널 - 로고+텍스트 */
  .splash-logo-wrap {
    flex: 0 0 420px;
    align-items: flex-start;
    padding: 0 60px;
    z-index: 1;
  }
  .splash-icon { width: 100px; height: 100px; border-radius: 24px; }
  .splash-title { font-size: 40px; margin-top: 22px; }
  .splash-tickers { flex-direction: column; gap: 10px; margin-top: 24px; }
  .splash-tick { font-size: 14px; }
  .splash-bar-wrap { width: 200px; margin-top: 32px; height: 4px; }
  .splash-sub { font-size: 13px; margin-top: 12px; }

  /* PC: 오른쪽 패널 - 큰 차트 */
  .splash-candles {
    position: relative;
    flex: 1;
    height: 100%;
    padding: 60px 40px 60px 0;
    opacity: 0;
    align-items: flex-end;
    justify-content: flex-end;
    gap: 8px;
    animation: candlesFadeIn 0.5s ease 0.2s forwards;
    border-left: 1px solid rgba(255,255,255,0.05);
    margin-left: 0;
  }
  .candle-body { width: 28px; border-radius: 3px; }
  .candle-wick { width: 3px; border-radius: 1px; }

  /* PC: 왼쪽에 세로 구분선 효과 */
  .splash-logo-wrap::after {
    display: none;
  }

  /* PC: 배경 그리드 라인 */
  .splash-grid {
    display: block;
    position: absolute;
    right: 0; top: 0; bottom: 0;
    flex: 1;
    pointer-events: none;
  }

  /* PC: 주가 라벨들 */
  .splash-price-labels {
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 60px 16px;
    font-family: 'SeoulNamsan', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    flex-shrink: 0;
    opacity: 0;
    animation: candlesFadeIn 0.5s ease 0.4s forwards;
  }
}


.tab-content-inner{padding:0 16px;}
.stock-row{display:flex;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:border-color 0.15s;}
.stock-row:hover{border-color:var(--border2);}
.stock-row.selected{border-color:var(--blue);background:var(--blue-bg);}
.s-info{flex:1;min-width:0;}
.s-ticker{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;font-family:'Space Grotesk',sans-serif;}
.s-name{font-size:11px;color:var(--text2);margin-top:2px;}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;}
.badge-inv{background:var(--red-bg);color:var(--red);}
.badge-lev{background:var(--purple-bg);color:var(--purple);}
.badge-base{background:var(--green-bg);color:var(--green);}
.s-price-col{text-align:right;margin:0 12px;}
.s-price{font-size:14px;font-weight:700;}
.s-change{font-size:11px;margin-top:2px;}
.s-change.up{color:var(--red);}
.s-change.down{color:var(--blue);}
.s-change.flat{color:var(--text3);}
.s-vol{font-size:11px;color:var(--text3);text-align:right;min-width:36px;}
.trade-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:16px;}
.trade-panel h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.trade-tabs{display:flex;gap:6px;margin-bottom:14px;}
.trade-tab{flex:1;padding:8px;font-size:13px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;font-family:'SeoulNamsan',sans-serif;color:var(--text2);transition:all 0.15s;}
.trade-tab.buy.active{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.trade-tab.sell.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.trade-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.trade-row label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;}
.trade-row input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:'SeoulNamsan',sans-serif;outline:none;}
.trade-row input:focus{border-color:var(--blue);}
.trade-summary{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;font-size:13px;}
.trade-summary .row{display:flex;justify-content:space-between;margin-bottom:4px;}
.trade-summary .row:last-child{margin-bottom:0;font-weight:700;border-top:1px solid var(--border);padding-top:6px;margin-top:2px;}
.trade-summary .row span:first-child{color:var(--text2);}
.btn-trade{width:100%;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;font-family:'SeoulNamsan',sans-serif;transition:opacity 0.15s;}
.btn-trade.buy{background:var(--red);color:white;}
.btn-trade.sell{background:var(--red);color:white;}
.btn-trade:hover{opacity:0.85;}
.btn-trade:disabled{opacity:0.35;cursor:not-allowed;}
.holding-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:8px;}
.holding-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.holding-ticker{font-size:14px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.holding-qty{font-size:12px;color:var(--text2);}
.holding-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.h-stat{font-size:11px;color:var(--text3);}
.h-stat-val{font-size:13px;font-weight:600;margin-top:2px;}
.holding-actions{display:flex;gap:8px;margin-top:10px;}
.btn-sm{flex:1;padding:7px;font-size:12px;font-weight:600;border-radius:var(--radius);border:1px solid;cursor:pointer;font-family:'SeoulNamsan',sans-serif;transition:all 0.15s;}
.btn-sm.buy{border-color:var(--red);color:var(--red);background:transparent;}
.btn-sm.buy:hover{background:var(--red-bg);}
.btn-sm.sell{border-color:var(--blue);color:var(--blue);background:transparent;}
.btn-sm.sell:hover{background:var(--blue-bg);}
.history-item{display:flex;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;font-size:13px;gap:10px;}
.hist-badge{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;flex-shrink:0;}
.hist-badge.buy{background:var(--red-bg);color:var(--red);}
.hist-badge.sell{background:var(--blue-bg);color:var(--blue);}
.hist-main{flex:1;}
.hist-name{font-weight:600;}
.hist-detail{font-size:11px;color:var(--text2);margin-top:1px;}
.hist-amount{text-align:right;flex-shrink:0;}
.hist-total{font-weight:700;}
.hist-total.up{color:var(--red);}
.hist-total.down{color:var(--blue);}
.hist-date{font-size:11px;color:var(--text3);}
.rank-item{display:flex;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;gap:12px;}
.rank-item.me{border-color:var(--blue);background:var(--blue-bg);}
.rank-num{font-size:16px;font-weight:700;width:28px;text-align:center;color:var(--text3);}
.rank-num.gold{color:#ffd700;}
.rank-num.silver{color:#c0c0c0;}
.rank-num.bronze{color:#cd7f32;}
.rank-info{flex:1;}
.rank-name{font-size:14px;font-weight:600;}
.rank-group{font-size:11px;color:var(--text2);}
.rank-right{text-align:right;}
.rank-total{font-size:14px;font-weight:700;}
.rank-ret{font-size:12px;}
.rank-ret.up{color:var(--red);}
.rank-ret.down{color:var(--blue);}
.asset-breakdown{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
.asset-breakdown h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text2);}
.asset-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
.asset-row:last-child{border-bottom:none;font-weight:700;font-size:16px;color:var(--blue);}
.asset-label{color:var(--text2);}
.holding-stock-item{background:var(--bg3);border-radius:var(--radius);padding:8px 10px;margin-top:8px;font-size:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:700;z-index:600;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.success{background:var(--green);color:#0d1117;}
.toast.error{background:var(--red);color:white;}
.toast.info{background:var(--blue);color:#0d1117;}
.empty{text-align:center;padding:48px 16px;color:var(--text2);font-size:14px;}
.empty-icon{font-size:32px;margin-bottom:12px;}
.closed-banner{background:var(--red-bg);border:1px solid var(--red);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red);font-weight:600;text-align:center;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--text2);}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;margin-top:20px;}

/* ── PC 레이아웃 ── */
@media (min-width: 900px) {
  body { background: var(--bg); }
  .app { max-width: 100%; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* PC 헤더 */
  .header {
    padding: 0 28px; height: 56px;
    background: #ffffff; border-bottom: 2px solid var(--border);
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
  }
  /* PC에서 탭은 사이드바로 변환되므로 sticky 불필요 */
  .tabs { position: static !important; }
  .header-logo { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; margin-right: 10px; }
  .header-left h1 { font-size: 15px; }
  .header-left p { font-size: 11px; }

  /* 사이드바 + 본문 */
  #main-content { margin-top: 56px; display: flex; height: calc(100vh - 56px); overflow: hidden; }

  /* 사이드바 */
  #tabs-nav {
    width: 180px; flex-shrink: 0;
    display: flex !important; flex-direction: column !important;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase 설정 ──────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDEGBu8sFChEdtnQEEC1FFZaAIwUr9fWpc",
  authDomain: "stock-c985f.firebaseapp.com",
  databaseURL: "https://stock-c985f-default-rtdb.firebaseio.com",
  projectId: "stock-c985f",
  storageBucket: "stock-c985f.firebasestorage.app",
  messagingSenderId: "1082843629086",
  appId: "1:1082843629086:web:58c6b2ca396cb7842d100f"
};
// ────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 상수 ───────────────────────────────────────────────
const GROUPS = [
  { id:1, name:'1모둠', members:['김수현','주시연','신재은','이주호'] },
  { id:2, name:'2모둠', members:['이세은','이서준','이다영','박준서'] },
  { id:3, name:'3모둠', members:['정서윤','조혜원','임승언','김지성'] },
  { id:4, name:'4모둠', members:['황세현','김지원','김주이','이강민'] },
  { id:5, name:'5모둠', members:['강민채','서은수','최상윤','최효민','이윤아'] },
  { id:6, name:'6모둠', members:['김준우','민나진','윤지환','이수빈','권용민'] },
];
const ALL_STUDENTS = GROUPS.flatMap(g => g.members.map(m => ({ name:m, group:g.id })));
const TEACHER_ACCOUNT = { name:'김민재 선생님', group:0, password:'teacher2024' };
const GROUP_COLORS = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#ff7b72','#d2a679'];

// ── 앱 상태 ────────────────────────────────────────────
let fbState    = null;   // Firebase에서 받은 전체 state
let currentUser = null;
let activeTab  = 'market';
let activeTradeType = 'buy';
let selectedStock   = null;
let tickTimer  = null;

// ── Firebase 초기화 (없으면 기본값 생성) ────────────────
async function ensureInitialized() {
  const snap = await get(ref(db, 'state'));
  if (!snap.exists()) {
    await set(ref(db, 'state'), buildDefaultState());
    showToast('데이터가 초기화되었습니다', 'info');
  }
}

function buildDefaultState() {
  const students = {};
  GROUPS.forEach(g => {
    const initQ = Math.floor(60 / g.members.length);
    g.members.forEach(m => {
      students[m] = { deposit:1000, holdings:{}, history:[], group:g.id };
      students[m].holdings[`G${g.id}`] = initQ;
    });
  });
  const groups = {};
  GROUPS.forEach(g => { groups[g.id] = { totalScore:1000 }; });
  const prices = {}, prevPrices = {}, shareSupply = {}, dailyClose = {};
  GROUPS.forEach(g => {
    prices[`G${g.id}`]       = 100;
    prices[`G${g.id}_INV`]   = 20;
    prices[`G${g.id}_LEV`]   = 20;
    prevPrices[`G${g.id}`]   = 100;
    prevPrices[`G${g.id}_INV`] = 20;
    prevPrices[`G${g.id}_LEV`] = 20;
    dailyClose[`G${g.id}`]   = 100;
    dailyClose[`G${g.id}_INV`] = 20;
    dailyClose[`G${g.id}_LEV`] = 20;
    shareSupply[`G${g.id}`]  = 60;
  });
  return { students, groups, prices, prevPrices, dailyClose, shareSupply, marketOpen:false };
}

// ── Firebase 실시간 구독 ────────────────────────────────
function subscribeState() {
  onValue(ref(db, 'state'), snap => {
    if (!snap.exists()) return;
    fbState = snap.val();
    // history가 없으면 빈 배열로
    if (fbState.students) {
      Object.keys(fbState.students).forEach(name => {
        if (!fbState.students[name].history) fbState.students[name].history = [];
        if (!fbState.students[name].holdings) fbState.students[name].holdings = {};
      });
    }
    updateStatusUI();
    updateNoticeBar();
    if (currentUser) {
      renderCurrentTab();
      refreshPcChart();
      // 토론방 열려있으면 메시지 갱신
      if (chartModalTicker && chartModalView === 'discuss') {
        const panel = document.getElementById('modal-chart-panel');
        if (panel && document.activeElement?.id !== 'discuss-input') {
          panel.innerHTML = renderChartModalInner(chartModalTicker);
        }
      }
    }
    else renderMain();
  }, err => {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>Firebase 연결 실패<br><small style="color:var(--text3)">${err.message}</small></div>`;
  });
}

// ── 10초 가격 틱 (관리자가 아닌 첫 접속자가 담당) ────────
function startPriceTick() {
  if (tickTimer) return;
  tickTimer = setInterval(async () => {
    if (!fbState || !fbState.marketOpen) return;
    const updates = {};
    const newPrev = { ...fbState.prices };
    GROUPS.forEach(g => {
      const key = `G${g.id}`;
      const score   = fbState.groups?.[g.id]?.totalScore ?? 1000;
      const supply  = fbState.shareSupply?.[key] ?? 60;
      const cur     = fbState.prices?.[key] ?? 100;
      const fundamental = score / supply;

      // ── 수요/공급 압력 계산 ──────────────────────────
      // 직전 10초간 매수/매도 압력 읽기 (tickPressure)
      const pressure = fbState.tickPressure?.[key] ?? 0; // 양수=매수압력, 음수=매도압력
      // 압력을 가격 변동으로 변환 (최대 ±5%)
      const pressureEffect = Math.max(-0.05, Math.min(0.05, pressure * 0.01));

      const noise   = (Math.random() - 0.485) * 0.04; // 노이즈 약간 줄임
      const drift   = (fundamental - cur) * 0.15;     // 기본가로 회귀
      const newBase = Math.max(1, Math.round((cur + drift + cur * noise + cur * pressureEffect) * 10) / 10);
      const basePct = (newBase - cur) / cur;

      updates[`state/prices/${key}`]     = newBase;
      updates[`state/prices/${key}_INV`] = Math.max(1, Math.round((fbState.prices[`${key}_INV`] ?? 20) * (1 - basePct) * 10) / 10);
      updates[`state/prices/${key}_LEV`] = Math.max(1, Math.round((fbState.prices[`${key}_LEV`] ?? 20) * (1 + basePct * 2) * 10) / 10);

      // 압력 소멸: 틱 후 압력을 0으로 리셋
      updates[`state/tickPressure/${key}`] = 0;
    });
    // 이전 가격 저장
    GROUPS.forEach(g => {
      ['', '_INV', '_LEV'].forEach(suf => {
        const k = `G${g.id}${suf}`;
        updates[`state/prevPrices/${k}`] = fbState.prices?.[k] ?? (suf ? 20 : 100);
      });
    });
    // ── 하루 시작 시 dailyClose/openPrice 업데이트 ─────
    const now = Date.now();
    const todayStr = new Date(now).toLocaleDateString('ko-KR');
    const savedDate = fbState.dailyCloseDate;
    if (savedDate !== todayStr) {
      // 날짜가 바뀌었으면: 어제 종가 = 현재가 저장, 오늘 시초가도 저장
      GROUPS.forEach(g => {
        ['', '_INV', '_LEV'].forEach(suf => {
          const k = `G${g.id}${suf}`;
          const curP = fbState.prices?.[k] ?? (suf ? 20 : 100);
          updates[`state/dailyClose/${k}`]  = curP; // 전날 종가
          updates[`state/openPrice/${k}`]   = curP; // 오늘 시초가
        });
      });
      updates['state/dailyCloseDate'] = todayStr;
    } else if (!fbState.openPrice) {
      // openPrice가 아직 없으면 현재가를 시초가로 설정
      GROUPS.forEach(g => {
        ['', '_INV', '_LEV'].forEach(suf => {
          const k = `G${g.id}${suf}`;
          updates[`state/openPrice/${k}`] = fbState.prices?.[k] ?? (suf ? 20 : 100);
        });
      });
    }
    // ── 캔들 데이터 기록 ──────────────────────────────
    const candleKey = Math.floor(now / 10000); // 10초 단위 키
    GROUPS.forEach(g => {
      ['', '_INV', '_LEV'].forEach(suf => {
        const k = `G${g.id}${suf}`;
        const newP = updates[`state/prices/${k}`] ?? fbState.prices?.[k] ?? 0;
        const oldP = fbState.prices?.[k] ?? newP;
        // 현재 캔들에 open이 없으면 이번 틱이 open
        const existingCandle = fbState.candles?.[k]?.[candleKey];
        const open  = existingCandle?.o ?? oldP;
        const high  = Math.max(existingCandle?.h ?? oldP, newP);
        const low   = Math.min(existingCandle?.l ?? oldP, newP);
        const close = newP;
        // 거래량: 이번 틱 거래 수 (간단히 랜덤 시뮬)
        const vol = (existingCandle?.v ?? 0) + Math.floor(Math.random() * 5);
        updates[`state/candles/${k}/${candleKey}`] = { o:open, h:high, l:low, c:close, v:vol, t:candleKey };
      });
    });
    // 캔들 최대 200개 유지 (오래된 것 삭제)
    GROUPS.forEach(g => {
      ['', '_INV', '_LEV'].forEach(suf => {
        const k = `G${g.id}${suf}`;
        const candlesForTicker = fbState.candles?.[k] ?? {};
        const keys = Object.keys(candlesForTicker).map(Number).sort((a,b)=>a-b);
        if (keys.length > 200) {
          keys.slice(0, keys.length - 200).forEach(old => {
            updates[`state/candles/${k}/${old}`] = null;
          });
        }
      });
    });
    await update(ref(db), updates);
  }, 10000);
}

// ── 유틸 ──────────────────────────────────────────────
function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtF(n, d=1) { return Number(n).toFixed(d); }
function pctChange(ticker) {
  const cur  = fbState?.prices?.[ticker] ?? 0;
  // dailyClose(전날종가) 있으면 그 기준, 없으면 openPrice(시초가) 기준
  const prev = fbState?.dailyClose?.[ticker] ?? fbState?.openPrice?.[ticker] ?? cur;
  return prev ? ((cur - prev) / prev * 100) : 0;
}
function getAvailShares(ticker) {
  if (ticker.includes('_INV') || ticker.includes('_LEV')) return 999999;
  const supply = fbState?.shareSupply?.[ticker] ?? 60;
  let held = 0;
  Object.values(fbState?.students ?? {}).forEach(s => held += s.holdings?.[ticker] ?? 0);
  return Math.max(0, supply - held);
}
function calcStockVal(sname) {
  const stu = fbState?.students?.[sname];
  if (!stu) return 0;
  let v = 0;
  Object.entries(stu.holdings ?? {}).forEach(([t, q]) => v += q * (fbState.prices?.[t] ?? 0));
  return v;
}
function calcTotal(sname) {
  const stu = fbState?.students?.[sname];
  return (stu?.deposit ?? 0) + calcStockVal(sname);
}
function initVal(gid) {
  const g = GROUPS.find(g => g.id === gid);
  return 1000 + 100 * Math.floor(60 / g.members.length);
}
function getStocks() {
  return GROUPS.flatMap((g, i) => [
    { ticker:`G${g.id}`, name:`${g.id}모둠`, desc:`${g.id}모둠이 점수를 모을수록 가격이 올라요`, type:'base', group:g.id, color:GROUP_COLORS[i] },

  ]);
}

function getCandles(ticker, period) {
  const raw = fbState.candles?.[ticker] ?? {};
  let candles = Object.values(raw).filter(Boolean).sort((a,b) => a.t - b.t);
  const now = Date.now() / 10000;
  if (period === '10m') candles = candles.filter(c => c.t >= now - 60);
  else if (period === '1h') candles = candles.filter(c => c.t >= now - 360);
  // 'all' = 전체
  return candles;
}

// ── 캔들차트 Canvas 렌더 ──────────────────────────────
function drawCandleChart(canvasId, volCanvasId, ticker, period) {
  const canvas = document.getElementById(canvasId);
  const volCanvas = document.getElementById(volCanvasId);
  if (!canvas || !volCanvas) return;

  const candles = getCandles(ticker, period);
  const dpr = window.devicePixelRatio || 1;

  // 캔들 영역
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight || 220;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // 거래량 영역
  const VW = volCanvas.offsetWidth;
  const VH = volCanvas.offsetHeight || 60;
  volCanvas.width  = VW * dpr;
  volCanvas.height = VH * dpr;
  const vctx = volCanvas.getContext('2d');
  vctx.scale(dpr, dpr);

  const PAD_L = 8, PAD_R = 52, PAD_T = 16, PAD_B = 8;
  const chartW = W - PAD_L - PAD_R;
  const chartH = H - PAD_T - PAD_B;

  // 배경
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);
  vctx.fillStyle = '#161b22';
  vctx.fillRect(0, 0, VW, VH);

  if (!candles.length) {
    ctx.fillStyle = '#8b949e';
    ctx.font = '13px SeoulNamsan, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('데이터를 수집 중입니다...', W/2, H/2);
    return;
  }

  // 가격 범위
  const highs  = candles.map(c => c.h);
  const lows   = candles.map(c => c.l);
  const maxP   = Math.max(...highs);
  const minP   = Math.min(...lows);
  const range  = maxP - minP || 1;
  const scaleY = v => PAD_T + chartH - ((v - minP) / range) * chartH;

  // 거래량 최대
  const maxV = Math.max(...candles.map(c => c.v || 0)) || 1;

  // 캔들 너비
  const n = candles.length;
  const candleW = Math.max(2, Math.min(14, Math.floor(chartW / n) - 2));
  const step    = chartW / n;

  // 격자선
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = PAD_T + (chartH / 4) * i;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    const val = maxP - (range / 4) * i;
    ctx.fillStyle = '#656d76';
    ctx.font = '10px SeoulNamsan, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(val.toFixed(1), W - PAD_R + 4, y + 3);
  }

  // 캔들 그리기
  candles.forEach((c, i) => {
    const x = PAD_L + i * step + step / 2;
    const isUp = c.c >= c.o;
    const color = isUp ? '#f85149' : '#58a6ff';

    // 심지
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, scaleY(c.h));
    ctx.lineTo(x, scaleY(c.l));
    ctx.stroke();

    // 몸통
    const yOpen  = scaleY(c.o);
    const yClose = scaleY(c.c);
    const bodyTop = Math.min(yOpen, yClose);
    const bodyH   = Math.max(1, Math.abs(yOpen - yClose));
    ctx.fillStyle = color;
    ctx.fillRect(x - candleW/2, bodyTop, candleW, bodyH);

    // 거래량 바
    const vBarH = ((c.v || 0) / maxV) * (VH - 8);
    vctx.fillStyle = isUp ? 'rgba(248,81,73,0.6)' : 'rgba(88,166,255,0.6)';
    vctx.fillRect(PAD_L + i * step + step/2 - candleW/2, VH - 4 - vBarH, candleW, vBarH);
  });

  // 현재가 라인
  const lastC = candles[candles.length - 1];
  if (lastC) {
    const yNow = scaleY(lastC.c);
    const isUp = lastC.c >= lastC.o;
    ctx.strokeStyle = isUp ? '#f85149' : '#58a6ff';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD_L, yNow); ctx.lineTo(W - PAD_R, yNow); ctx.stroke();
    ctx.setLineDash([]);
    // 가격 라벨
    ctx.fillStyle = isUp ? '#f85149' : '#58a6ff';
    ctx.fillRect(W - PAD_R + 1, yNow - 8, PAD_R - 2, 16);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 10px SeoulNamsan, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(lastC.c.toFixed(1), W - PAD_R + (PAD_R/2), yNow + 4);
  }

  // 거래량 라벨
  vctx.fillStyle = '#656d76';
  vctx.font = '10px SeoulNamsan, sans-serif';
  vctx.textAlign = 'left';
  vctx.fillText('거래량', 4, 12);
}

window.executeModalTrade = async function executeModalTrade(ticker) {
  if (!fbState.marketOpen) return showToast('폐장 중에는 거래할 수 없습니다', 'error');
  const qty   = parseInt(document.getElementById('modal-trade-qty')?.value) || 0;
  if (qty <= 0) return showToast('수량을 입력해주세요', 'error');
  const price = fbState.prices?.[ticker] ?? 0;
  const total = qty * price;
  const stu   = fbState.students[currentUser];
  const isBuy = activeTradeType === 'buy';
  if (isBuy) {
    if (total > stu.deposit) return showToast('예금이 부족합니다', 'error');
    const avail = getAvailShares(ticker);
    if (!ticker.includes('_INV') && !ticker.includes('_LEV') && qty > avail)
      return showToast(`매물 부족 (잔여: ${avail}주)`, 'error');
  } else {
    if ((stu.holdings?.[ticker] ?? 0) < qty) return showToast('보유 수량이 부족합니다', 'error');
  }
  const btn = document.querySelector('#chart-modal-root .btn-trade');
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }
  try {
    const stuRef = ref(db, 'state/students/' + currentUser);
    await runTransaction(stuRef, cur => {
      if (!cur) return cur;
      if (isBuy) {
        cur.deposit = Math.round((cur.deposit - total) * 100) / 100;
        cur.holdings = cur.holdings ?? {};
        cur.holdings[ticker] = (cur.holdings[ticker] ?? 0) + qty;
      } else {
        if ((cur.holdings?.[ticker] ?? 0) < qty) return;
        cur.deposit = Math.round((cur.deposit + total) * 100) / 100;
        cur.holdings[ticker] -= qty;
      }
      if (!cur.history) cur.history = [];
      cur.history.push({ type:isBuy?'buy':'sell', ticker, qty, price, total, date:new Date().toLocaleString('ko-KR') });
      return cur;
    });
    // ── 수요/공급 압력 누적 ──────────────────────────
    if (!ticker.includes('_INV') && !ticker.includes('_LEV')) {
      const pressureDelta = isBuy ? qty : -qty;
      const curPressure = fbState.tickPressure?.[ticker] ?? 0;
      await update(ref(db, 'state/tickPressure'), {
        [ticker]: curPressure + pressureDelta
      });
    }
    showToast(`${isBuy?'구매':'판매'} 완료! ${qty}주 × ${fmtF(price)}점`, 'success');
    // 모달 내 거래 영역만 갱신
    const panel = document.getElementById('modal-chart-panel');
    if (panel) panel.innerHTML = renderChartModalInner(ticker);
    setTimeout(() => drawCandleChart('modal-candle-canvas','modal-vol-canvas', ticker, chartPeriod), 30);
  } catch(e) {
    showToast('거래 중 오류가 발생했습니다', 'error');
  }
}

// PC 차트 자동 갱신 (Firebase 업데이트 시 호출)
function refreshPcChart() {
  if (selectedStock && window.innerWidth >= 900) {
    // 수량 입력 중이면 차트 캔버스만 다시 그리고 HTML은 재렌더 안 함
    const qtyFocused = document.activeElement?.id === 'trade-qty';
    const panel = document.getElementById('pc-chart-panel');
    if (panel) {
      if (!qtyFocused) {
        panel.innerHTML = renderChartPanel(selectedStock);
      }
      setTimeout(() => drawCandleChart('pc-candle-canvas','pc-vol-canvas', selectedStock, chartPeriod), 30);
    }
  }
  // 모바일 모달: 수량 입력 중이면 차트만 다시 그림
  if (chartModalTicker) {
    const qtyFocused = document.activeElement?.id === 'modal-trade-qty';
    const panel = document.getElementById('modal-chart-panel');
    if (panel && !qtyFocused) {
      // 현재 입력값 저장
      const savedQty = document.getElementById('modal-trade-qty')?.value;
      panel.innerHTML = renderChartModalInner(chartModalTicker);
      setTimeout(() => {
        drawCandleChart('modal-candle-canvas','modal-vol-canvas', chartModalTicker, chartPeriod);
        // 입력값 복원
        const qtyEl = document.getElementById('modal-trade-qty');
        if (qtyEl && savedQty) qtyEl.value = savedQty;
      }, 30);
    } else if (panel && qtyFocused) {
      // 입력 중엔 캔버스만 다시 그림
      setTimeout(() => drawCandleChart('modal-candle-canvas','modal-vol-canvas', chartModalTicker, chartPeriod), 30);
    }
  }
}

// ── 간단 공지 마퀴 ────────────────────────────────────
function updateNoticeBar() {
  const bar = document.getElementById('notice-bar');
  if (!bar) return;
  const noticesObj = fbState?.notices || {};
  const notices = typeof noticesObj === 'object' && !Array.isArray(noticesObj)
    ? Object.values(noticesObj).filter(Boolean)
    : [];
  if (!notices.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const sorted = [...notices].sort((a,b) => (a.ts||0)-(b.ts||0));
  const items = sorted.map(n => `<span class="marquee-item">📢 ${n.text}</span>`).join('');
  bar.innerHTML = `<div class="marquee-wrap"><div class="marquee-inner">${items}${items}</div></div>`;
}

// ── PC 뉴스 사이드 패널 ──────────────────────────────
function renderNewsSidePanel() {
  const panel = document.getElementById('news-side-panel');
  if (!panel) return;
  // 모바일에서는 뉴스 사이드 패널 사용 안 함
  if (window.innerWidth < 900) { panel.innerHTML = ''; return; }
  const newsObj = fbState?.news || {};

    ? Object.values(newsObj).filter(Boolean) : [];
  const sorted = [...news].sort((a,b) => (b.ts||0)-(a.ts||0));

  panel.innerHTML = `<div class="news-side-title">📰 뉴스</div>` + sorted.map(n => `
    <div class="news-side-card">

function attachLoginBtn() {

  });

  btn?.addEventListener('click', () => {

function attachTabListeners() {
  // stock row click
  document.querySelectorAll('.stock-row[data-ticker]').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.ticker;
      if (window.innerWidth < 900) {
        // 모바일: 전체화면 모달
        openChartModal(t);
      } else {
        // PC: 오른쪽 패널
        selectedStock = selectedStock === t ? null : t;
        activeTradeType = 'buy';
        renderCurrentTab();
      }
    });
  });
  // trade type tabs
  document.querySelectorAll('.trade-tab[data-tt]').forEach(btn => {
    btn.addEventListener('click', () => { activeTradeType = btn.dataset.tt; renderCurrentTab(); });
  });
  // qty input
  const qtyEl = document.getElementById('trade-qty');
  if (qtyEl) qtyEl.addEventListener('input', updateTradeTotal);
  // max button
  document.getElementById('btn-max')?.addEventListener('click', () => {
    if (!selectedStock) return;
    const stu   = fbState.students[currentUser];
    const price = fbState.prices?.[selectedStock] ?? 1;
    const held  = stu.holdings?.[selectedStock] ?? 0;
    const avail = getAvailShares(selectedStock);
    const max   = activeTradeType === 'buy' ? Math.min(Math.floor(stu.deposit / price), avail) : held;
    if (qtyEl) { qtyEl.value = max; updateTradeTotal(); }
  });

  document.getElementById('btn-execute')?.addEventListener('click', executeTrade);
  // portfolio quick trade
  document.querySelectorAll('[data-quick-ticker]').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedStock = btn.dataset.quickTicker;
      activeTradeType = btn.dataset.quickType;
      activeTab = 'market';
      renderMain();
      setTimeout(() => document.getElementById('trade-panel')?.scrollIntoView({behavior:'smooth',block:'start'}), 150);
    });
  });
}

function updateTradeTotal() {
  const qty = parseInt(document.getElementById('trade-qty')?.value) || 0;
  const el  = document.getElementById('trade-total');
  if (el) el.textContent = fmtF((qty * (fbState.prices?.[selectedStock] ?? 0))) + '점';
}

// ── 거래 실행 (Firebase Transaction) ──────────────────
async function executeTrade() {
  if (!fbState.marketOpen) return showToast('폐장 중에는 거래할 수 없습니다', 'error');
  const qty   = parseInt(document.getElementById('trade-qty')?.value) || 0;
  if (qty <= 0) return showToast('수량을 입력해주세요', 'error');
  const price = fbState.prices?.[selectedStock] ?? 0;
  const total = qty * price;
  const stu   = fbState.students[currentUser];
  const isBuy = activeTradeType === 'buy';

  if (isBuy) {
    if (total > stu.deposit) return showToast('예금이 부족합니다', 'error');
    const avail = getAvailShares(selectedStock);
    if (!selectedStock.includes('_INV') && !selectedStock.includes('_LEV') && qty > avail) {
      return showToast(`매물 부족 (잔여: ${avail}주)`, 'error');
    }
  } else {
    const held = stu.holdings?.[selectedStock] ?? 0;
    if (qty > held) return showToast('보유 수량이 부족합니다', 'error');
  }

  const btn = document.getElementById('btn-execute');
  if (btn) { btn.disabled = true; btn.textContent = '처리 중...'; }

  try {
    const stuRef  = ref(db, `state/students/${currentUser}`);
    await runTransaction(stuRef, current => {
      if (!current) return current;
      if (isBuy) {
        current.deposit = Math.round((current.deposit - total) * 100) / 100;
        current.holdings = current.holdings ?? {};
        current.holdings[selectedStock] = (current.holdings[selectedStock] ?? 0) + qty;
      } else {
        const held = current.holdings?.[selectedStock] ?? 0;
        if (held < qty) return; // abort
        current.deposit = Math.round((current.deposit + total) * 100) / 100;
        current.holdings[selectedStock] = held - qty;
      }
      if (!current.history) current.history = [];
      current.history.push({
        type: isBuy ? 'buy' : 'sell',
        ticker: selectedStock,
        qty, price, total,
        date: new Date().toLocaleString('ko-KR')
      });
      return current;
    });

    // ── 수요/공급 압력 누적 ──────────────────────────
    // 기본 주식(G1~G6)만 압력 반영 (인버스/레버리지는 파생상품이므로 제외)
    const baseTicker = selectedStock.replace('_INV','').replace('_LEV','');
    if (!selectedStock.includes('_INV') && !selectedStock.includes('_LEV')) {
      // 매수: 양수 압력, 매도: 음수 압력 (수량에 비례)
      const pressureDelta = isBuy ? qty : -qty;
      const curPressure = fbState.tickPressure?.[selectedStock] ?? 0;
      await update(ref(db, 'state/tickPressure'), {
        [selectedStock]: curPressure + pressureDelta
      });
    }
    showToast(`${isBuy ? '구매' : '판매'} 완료! ${qty}주 × ${fmtF(price)}점`, 'success');
    selectedStock = null;
    renderCurrentTab();
  } catch(e) {
    showToast('거래 중 오류가 발생했습니다', 'error');
    if (btn) { btn.disabled = false; btn.textContent = isBuy ? '주식 구매하기' : '주식 판매하기'; }
  }
}

// ── 포트폴리오 탭 ────────────────────────────────────────
function renderPortfolio() {
  const stu    = fbState.students[currentUser];
  const stocks = getStocks();
  const held   = stocks.filter(s => (stu.holdings?.[s.ticker] ?? 0) > 0);
  const closed = !fbState.marketOpen;

  if (held.length === 0) return `
    ${closed ? '<div class="closed-banner">🔒 현재 폐장 중입니다.</div>' : ''}
    <div class="empty"><div class="empty-icon">📦</div>보유 종목이 없습니다.<br>시장 탭에서 주식을 구매해보세요!</div>`;

  const stockVal = held.reduce((sum, s) => sum + (stu.holdings[s.ticker] ?? 0) * (fbState.prices?.[s.ticker] ?? 0), 0);
  return `
    ${closed ? '<div class="closed-banner">🔒 현재 폐장 중입니다.</div>' : ''}
    <div class="metrics">
      <div class="metric"><div class="metric-label">주식 평가액</div><div class="metric-value blue">${fmt(stockVal)}점</div></div>
      <div class="metric"><div class="metric-label">보유 예금</div><div class="metric-value neutral">${fmt(stu.deposit)}점</div></div>
    </div>
    <div class="section-title">보유 종목</div>
    <div class="holdings-grid">
    ${held.map(s => {
      const qty  = stu.holdings[s.ticker] ?? 0;
      const cur  = fbState.prices?.[s.ticker] ?? 0;
      const curV = qty * cur;
      const buys = (stu.history ?? []).filter(h => h.type === 'buy' && h.ticker === s.ticker);
      const avgB = buys.length ? buys.reduce((a,h)=>a+h.total,0) / buys.reduce((a,h)=>a+h.qty,0) : cur;
      const pnl  = (cur - avgB) * qty;
      const pnlP = avgB > 0 ? ((cur - avgB) / avgB * 100) : 0;
      const up   = pnl >= 0;
      return `
        <div class="holding-card">
          <div class="holding-header">
            <div>
              <div class="holding-ticker" style="color:${s.color}">${s.name}</div>
              <div class="holding-qty">${s.name} · ${qty}주 보유</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:16px;font-weight:700">${fmt(curV)}점</div>
              <div style="font-size:12px;color:var(--${up?'red':'blue'})">${up?'+':''}${fmt(pnl)}점 (${up?'+':''}${pnlP.toFixed(2)}%)</div>
            </div>
          </div>
          <div class="holding-stats">
            <div><div class="h-stat">평균 구매가</div><div class="h-stat-val">${fmtF(avgB)}점</div></div>
            <div><div class="h-stat">현재가</div><div class="h-stat-val">${fmtF(cur)}점</div></div>
            <div><div class="h-stat">평가 손익</div><div class="h-stat-val" style="color:var(--${up?'red':'blue'})">${up?'+':''}${fmt(pnl)}점</div></div>
          </div>
          ${fbState.marketOpen ? `
          <div class="holding-actions">
            <button class="btn-sm buy"  data-quick-ticker="${s.ticker}" data-quick-type="buy">+ 살게요</button>
            <button class="btn-sm sell" data-quick-ticker="${s.ticker}" data-quick-type="sell">− 팔게요</button>
          </div>` : ''}
        </div>`;
    }).join('')}
    </div>`;
}

// ── 거래내역 탭 ──────────────────────────────────────────
function renderHistory() {
  const hist = [...(fbState.students[currentUser]?.history ?? [])].reverse();
  if (!hist.length) return `<div class="empty"><div class="empty-icon">📋</div>거래 내역이 없습니다.</div>`;
  const stocks = getStocks();
  return `<div class="history-2col">` + hist.map(h => {
    const stock = stocks.find(s => s.ticker === h.ticker);
    const isBuy = h.type === 'buy';
    return `
      <div class="history-item">
        <span class="hist-badge ${h.type}">${isBuy?'구매':'판매'}</span>
        <div class="hist-main">
          <div class="hist-name">${stock?.name ?? h.ticker}</div>
          <div class="hist-detail">${h.qty}주 × ${fmtF(h.price)}점</div>
        </div>
        <div class="hist-amount">
          <div class="hist-total ${isBuy?'down':'up'}">${isBuy?'-':'+'}${fmt(h.total)}점</div>
          <div class="hist-date">${h.date}</div>
        </div>
      </div>`;
  }).join('') + `</div>`;
}

// ── 순위 탭 ─────────────────────────────────────────────
function renderRanking() {
  const ranked = ALL_STUDENTS.map(s => ({
    name:s.name, group:s.group, total: calcTotal(s.name)
  })).sort((a,b) => b.total - a.total);

  return `<div class="rank-asset-grid"><div>` + ranked.map((p, i) => {
    const isMe = p.name === currentUser;
    const g    = GROUPS.find(g => g.id === p.group);
    const ret  = ((p.total - initVal(p.group)) / initVal(p.group) * 100);
    const up   = ret >= 0;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return `
      <div class="rank-item${isMe?' me':''}">
        <div class="rank-num ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medal}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}${isMe?' <span style="font-size:11px;color:var(--blue);">나</span>':''}</div>
          <div class="rank-group">${g?.name}</div>
        </div>
        <div class="rank-right">
          <div class="rank-total">${fmt(p.total)}점</div>
          <div class="rank-ret ${up?'up':'down'}">${up?'+':''}${ret.toFixed(2)}%</div>
        </div>
      </div>`;
  }).join('') + `</div><div>${renderAssets()}</div></div>`;
}

// ── 자산확인 탭 (PC에서는 순위탭 옆에 표시됨)
function renderAssetsStandalone() { return renderAssets(); }

// ── 자산확인 탭 ─────────────────────────────────────────
function renderAssets() {
  const stu  = fbState.students[currentUser];
  const sv   = calcStockVal(currentUser);
  const total = (stu?.deposit ?? 0) + sv;
  const dep  = stu?.deposit ?? 0;
  const iv   = initVal(stu?.group);
  const ret  = ((total - iv) / iv * 100);
  const up   = ret >= 0;
  const cashP  = total > 0 ? dep / total * 100 : 0;
  const stockP = total > 0 ? sv  / total * 100 : 0;

  const stocks = getStocks();
  const held = stocks.filter(s => (stu?.holdings?.[s.ticker] ?? 0) > 0);

  return `
    <div class="metrics">
      <div class="metric"><div class="metric-label">총 자산</div><div class="metric-value ${up?'up':'down'}">${fmt(total)}점</div><div class="metric-sub ${up?'up':'down'}">${up?'+':''}${ret.toFixed(2)}%</div></div>
      <div class="metric"><div class="metric-label">손익</div><div class="metric-value ${up?'up':'down'}">${up?'+':''}${fmt(total-iv)}점</div></div>
    </div>
    <div class="asset-breakdown">
      <h3>자산 구성</h3>
      <div class="asset-row"><span class="asset-label">예금 (현금)</span><span>${fmt(dep)}점</span></div>
      <div class="asset-row"><span class="asset-label">주식 평가액</span><span>${fmt(sv)}점</span></div>
      <div class="asset-row"><span class="asset-label">총 자산</span><span>${fmt(total)}점</span></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2);">자산 비율</h3>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;">
        <span>예금 ${cashP.toFixed(1)}%</span><span>주식 ${stockP.toFixed(1)}%</span>
      </div>
      <div style="height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;display:flex;">
        <div style="width:${cashP.toFixed(1)}%;background:var(--blue);border-radius:5px 0 0 5px;"></div>
        <div style="width:${stockP.toFixed(1)}%;background:var(--green);border-radius:0 5px 5px 0;"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;">
        <span style="color:var(--blue);">■ 예금</span><span style="color:var(--green);">■ 주식</span>
      </div>
    </div>
    ${held.length > 0 ? `
      <div class="section-title">보유 종목 상세</div>
      ${held.map(s => {
        const qty = stu.holdings[s.ticker] ?? 0;
        const p   = fbState.prices?.[s.ticker] ?? 0;
        return `<div class="holding-stock-item">
          <div style="display:flex;justify-content:space-between;">
            <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:${s.color}">${s.ticker}</span>
            <span style="font-weight:700">${fmt(qty*p)}점</span>
          </div>
          <div style="color:var(--text2);margin-top:3px;">${s.name} · ${qty}주 × ${fmtF(p)}점</div>
        </div>`;
      }).join('')}` : ''}`;
}

// ── 토스트 ────────────────────────────────────────────
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
}


// ── 뉴스 탭 ────────────────────────────────────────────
function renderNews() {
  const newsObj = fbState.news || {};
  const news = typeof newsObj === 'object' && !Array.isArray(newsObj)
    ? Object.values(newsObj).filter(Boolean)
    : (Array.isArray(newsObj) ? newsObj : []);
  if (!news.length) {
    return `<div class="empty"><div class="empty-icon">📰</div>등록된 뉴스가 없습니다.<br><span style="font-size:12px;color:var(--text3)">선생님이 뉴스를 작성하면 여기에 표시됩니다.</span></div>`;
  }
  const sorted = [...news].sort((a,b) => (b.ts||0) - (a.ts||0));
  return `<div class="news-grid">${sorted.map(n => `
    <div class="news-card" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;background:var(--blue-bg);color:var(--blue);">${n.category||'공지'}</span>
        <span style="font-size:11px;color:var(--text3);">${n.date||''}</span>
      </div>
      <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)">${n.title||''}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;">${(n.body||'').replace(/\n/g,'<br>')}</div>
    </div>
  `).join('')}</div>`;
}

// ── 시작 ─────────────────────────────────────────────
await ensureInitialized();
subscribeState();

// ── 스플래시 스크린 ───────────────────────────────────
(function() {
  // 숫자 카운트업 애니메이션
  function animateNum(el, start, end, duration) {
    if (!el) return;
    const range = end - start;
    const step = 50;
    const steps = duration / step;
    let cur = start;
    const timer = setInterval(() => {
      cur += range / steps + (Math.random() - 0.4) * 0.3;
      cur = Math.min(Math.max(cur, Math.min(start,end)), Math.max(start,end));
      el.textContent = Math.abs(cur).toFixed(1);
      if (Math.abs(cur - end) < 0.1) {
        el.textContent = end.toFixed(1);
        clearInterval(timer);
      }
    }, step);
  }
  setTimeout(() => {
    animateNum(document.getElementById('sp1'), 14.0, 16.2, 1800);
    animateNum(document.getElementById('sp3'), 16.5, 14.8, 1800);
    animateNum(document.getElementById('sp5'), 15.3, 18.1, 1800);
  }, 1100);

  // 4초 후 스플래시 숨기기
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) {
      s.classList.add('hide');
      setTimeout(() => s.remove(), 600);
    }
  }, 4000);
})();

</script>
</body>
</html>
